<html>
    <head>
        <title>CaddHome - Site</title>
        <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}">
    </head>
    <body>
        <div id="slideshow-container" class="slideshow-container">
            <img id="slideshow-image" src="{{url_for('static', filename='images/1.jpg')}}">
        </div>

        <script>
            const images = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg"];
            const imagePath = "../static/images/";
            const slide = document.getElementById("slideshow-image");
            const slideContainer = document.getElementById("slideshow-container");
            const fadeDuration = 2500;
            const slideDuration = 7500;
            let currentIndex = 0;

            window.onload = () => {
                slide.src = imagePath + images[currentIndex];
                slideContainer.classList.add("fade-in");
                setTimeout(changeImage, slideDuration);
            }

            function changeImage() {
                slideContainer.classList.remove("fade-in");
                void slideContainer.offsetWidth;
                slideContainer.classList.add("fade-out");

                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex >= images.length) {
                        currentIndex = 0;
                    }
                    slide.src = imagePath + images[currentIndex];

                    slideContainer.classList.remove("fade-out");
                    void slideContainer.offsetWidth;
                    slideContainer.classList.add("fade-in");

                    setTimeout(changeImage, slideDuration);
                }, fadeDuration);
            }
        </script>
    </body>
</html>
